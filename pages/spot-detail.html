                history: '<p>五道口因京张铁路等五条铁路在此交汇而得名。20世纪30年代，这里是清华、北大等校学生活动的重要区域。如今的五道口是北京著名的繁华区域。</p>',
                location: '北京市海淀区成府路五道口',
                wikiLink: 'https://baike.baidu.com/item/%E4%BA%94%E9%81%93%E5%8F%A3/13041688',
                analysis: ''
            }
        };

        document.addEventListener('DOMContentLoaded', function() {
            initScrollProgress();
            initNavigation();
            initScrollAnimations();
            loadSpotDetail();
        });

        function loadSpotDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const spotId = urlParams.get('id');
            const from = urlParams.get('from');
            
            const spot = spotsData[spotId];
            if (spot) {
                document.getElementById('spot-title').textContent = spot.title;
                document.getElementById('spot-subtitle').textContent = spot.subtitle;
                document.getElementById('spot-image').src = spot.image;
                document.getElementById('spot-description').innerHTML = spot.description;
                document.getElementById('spot-history').innerHTML = spot.history;
                document.getElementById('spot-location').textContent = spot.location;
                document.getElementById('wiki-link').href = spot.wikiLink;
                document.getElementById('spot-analysis-content').innerHTML = spot.analysis || '<p>暂无分析数据</p>';
                
                const header = document.getElementById('spot-detail-header');
                const descSection = document.getElementById('description-section');
                const historySection = document.getElementById('history-section');
                const wikiLink = document.getElementById('wiki-link');
                
                if (spot.theme === 'blue') {
                    header.classList.add('blue');
                    descSection.classList.add('blue');
                    historySection.classList.add('blue');
                    wikiLink.classList.add('blue');
                }
                
                if (from === 'may4th') {
                    document.getElementById('backBtn').href = 'may4th.html';
                    document.getElementById('backBtn').innerHTML = '<span>←</span><span>返回五四运动路线</span>';
                } else if (from === 'dec9th' || from === 'dec9th-16') {
                    document.getElementById('backBtn').href = 'dec9th-day16.html';
                    document.getElementById('backBtn').innerHTML = '<span>←</span><span>返回一二·九16日路线</span>';
                } else if (from === 'dec9th-9') {
                    document.getElementById('backBtn').href = 'dec9th-day9.html';
                    document.getElementById('backBtn').innerHTML = '<span>←</span><span>返回一二·九9日路线</span>';
                } else {
                    document.getElementById('backBtn').href = '../index.html';
                    document.getElementById('backBtn').innerHTML = '<span>←</span><span>返回首页</span>';
                }
            } else {
                document.getElementById('spot-title').textContent = '景点未找到';
            }
        }
    </script>
</body>
</html>
